name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run linter
        run: npm run lint
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          ACCESS_TOKEN_SECRET: test_access_token_secret_for_ci
          REFRESH_TOKEN_SECRET: test_refresh_token_secret_for_ci
          ACCESS_TOKEN_EXPIRY: 1d
          REFRESH_TOKEN_EXPIRY: 10d
          REDIS_URL: redis://localhost:6379
          NODE_OPTIONS: --experimental-vm-modules

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        working-directory: backend
        run: docker build -t mediaverse-backend .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "========================================"
            echo "🚀 Starting MediaVerse Production Deploy"
            echo "========================================"

            # Go to project
            cd /home/${{ secrets.EC2_USERNAME }}/mediaverse

            echo "📥 Fetching latest code..."
            git fetch origin

            echo "🔄 Resetting local repository..."
            git reset --hard origin/main
            git clean -fd

            echo "📦 Installing production dependencies..."
            cd backend
            npm ci --omit=dev

            echo "🐳 Starting infrastructure..."
            docker compose up -d --remove-orphans

            echo "⏳ Waiting for MongoDB..."
            timeout 60 bash -c '
            until [ "$(docker inspect --format="{{.State.Health.Status}}" backend-mongo-1)" = "healthy" ]
            do
                echo "MongoDB is starting..."
                sleep 2
            done
            '

            echo "⏳ Waiting for Redis..."
            timeout 60 bash -c '
            until [ "$(docker inspect --format="{{.State.Health.Status}}" backend-redis-1)" = "healthy" ]
            do
                echo "Redis is starting..."
                sleep 2
            done
            '

            echo "⏳ Waiting for Typesense..."
            timeout 60 bash -c '
            until curl -sf http://127.0.0.1:8108/health >/dev/null
            do
                echo "Typesense is starting..."
                sleep 2
            done
            '

            echo "♻️ Reloading PM2..."
            pm2 reload ecosystem.config.cjs --update-env

            echo "⏳ Waiting for API..."
            timeout 60 bash -c '
            until curl -sf http://127.0.0.1:8000/health/readiness \
                || curl -sf http://127.0.0.1:8000/api/v1/healthcheck \
                || curl -sf http://127.0.0.1:8000/health
            do
                echo "API is starting..."
                sleep 2
            done
            '

            echo ""
            echo "=============================="
            echo "✅ Deployment Successful!"
            echo "=============================="

            echo ""
            echo "📊 PM2 Status"
            pm2 status

            echo ""
            echo "🐳 Docker Status"
            docker compose ps
