name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run linter
        run: npm run lint
        working-directory: backend

      - name: Run tests
        run: npm test
        working-directory: backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
          ACCESS_TOKEN_SECRET: test_access_token_secret_for_ci
          REFRESH_TOKEN_SECRET: test_refresh_token_secret_for_ci
          ACCESS_TOKEN_EXPIRY: 1d
          REFRESH_TOKEN_EXPIRY: 10d
          REDIS_URL: redis://localhost:6379
          NODE_OPTIONS: --experimental-vm-modules

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/mediaverse
            
            # 1. Pull latest code
            git pull origin main
            
            # 2. Update backend dependencies
            cd backend
            npm ci --omit=dev
            
            # 3. Start/update infrastructure
            docker compose up -d --remove-orphans
            
            # 4. Wait until Mongo, Redis, and Typesense are healthy
            echo "Waiting for infrastructure to be healthy..."
            timeout 60 bash -c 'until docker compose ps | grep -q "(healthy)"; do sleep 2; done'
            
            # 5. Reload PM2 gracefully
            pm2 reload ecosystem.config.cjs --update-env
            
            # 6. Perform deployment verification
            echo "Verifying deployment..."
            sleep 5
            if ! curl -sf http://localhost:8000/health/readiness; then
              echo "Deployment failed health check!"
              pm2 logs --lines 50
              docker compose logs --tail 50
              exit 1
            fi
            echo "Deployment verified successfully!"
