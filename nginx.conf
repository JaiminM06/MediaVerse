# /etc/nginx/nginx.conf or /etc/nginx/sites-available/mediaverse

# Define the upstream PM2 Node.js cluster (running on port 8000)
upstream mediaverse_api {
    server 127.0.0.1:8000;
    # If running across multiple Docker containers, use their IPs or Docker DNS:
    # server api:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.mediaverse.com; # Replace with your actual domain

    # Redirect all HTTP traffic to HTTPS (uncomment when SSL is ready)
    # return 301 https://$host$request_uri;

    # Basic security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Optimize serving large files (HLS/video) if served directly
    client_max_body_size 500M; # Match backend limit (500MB)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Logging
    access_log /var/log/nginx/mediaverse_access.log;
    error_log /var/log/nginx/mediaverse_error.log warn;

    # Main API Proxy
    location / {
        proxy_pass http://mediaverse_api;
        
        # Pass necessary headers to Express for trust proxy to work
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # WebSocket Proxy for Socket.IO
    location /socket.io/ {
        proxy_pass http://mediaverse_api;
        
        # Required for WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Prevent Socket.IO disconnections from Nginx timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
