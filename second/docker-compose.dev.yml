services:
  api:
    build: .
    ports: ["8000:8000"]
    depends_on: [mongo, redis, minio]
    env_file: .env.dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src       # hot reload in dev
      - ./logs:/app/logs
    command: node --watch src/index.js

  worker:
    build: .
    command: node --watch src/workers/index.js
    depends_on: [mongo, redis, minio]
    env_file: .env.dev
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs

  mongo:
    image: mongo:7
    volumes: [mongo-data:/data/db]
    ports: ["27017:27017"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio-data:/data]

  typesense:
    image: typesense/typesense:0.25.2
    command: --data-dir /data --api-key=mediaverse_ts_dev_key --enable-cors
    ports: ["8108:8108"]
    volumes: [typesense-data:/data]

volumes:
  mongo-data:
  minio-data:
  typesense-data:
